<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard SNGM - Minerais Estratégicos</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Twemoji Country Flags: garante bandeiras em Windows/Chrome -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1/dist/TwemojiCountryFlags.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face {
  font-family: "Twemoji Country Flags";
  unicode-range: U+1F1E6-1F1FF, U+1F3F4, U+E0062-E007F;
  src: url('https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1/dist/TwemojiCountryFlags.woff2') format('woff2');
  font-display: swap;
}
</style>

<style>
/* ════════════════════════════════════════════════════════════════════
   🎨 DESIGN TOKENS
   ════════════════════════════════════════════════════════════════════ */
:root {
  --font-main: "Twemoji Country Flags", 'DM Sans', system-ui, sans-serif;
  --font-display: "Twemoji Country Flags", 'Outfit', system-ui, sans-serif;

  --fs-xs:    12px;
  --fs-sm:    13px;
  --fs-base:  14px;
  --fs-md:    15px;
  --fs-lg:    17px;
  --fs-xl:    20px;
  --fs-2xl:   24px;
  --fs-3xl:   30px;
  --fs-hero:  56px;

  --orange:        #E8920D;
  --orange-fill:   #FFF3DB;
  --orange-light:  #FFF8EC;
  --dark:          #1A1A1A;
  --gray:          #4A4A4A;
  --light:         #6E6E6E;
  --bg-card:       #FFFFFF;
  --bg-page:       #F0EFEC;
  --br-green:      #009C3B;
  --br-blue:       #002776;
  --br-yellow:     #FFDF00;

  --pad-slide-x:   56px;
  --pad-slide-y:   18px;
  --pad-card:      18px;
  --gap-cards:     14px;

  --radius:        12px;
  --radius-sm:     8px;
  --shadow-sm:     0 1px 3px rgba(0,0,0,0.06);
  --shadow-md:     0 6px 24px rgba(0,0,0,0.10);

  --sidebar-w:     290px;

  --glass-bg:       rgba(255,255,255,0.3);
  --glass-blur:     blur(14px) saturate(160%);
  --glass-border:   1px solid rgba(255,255,255,0.5);

  --emp-photo-h: 180px;
}

*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
html{
  /* importante: deixa o html scrollar mas body fixo no desktop */
  overflow:hidden;
}
body{
  font-family:var(--font-main);
  font-size:var(--fs-base);
  background:#1a1a2e;color:var(--dark);
  -webkit-tap-highlight-color:transparent;
  overflow:hidden;
}

/* ─── HAMBURGER ─── */
.hamburger{
  position:fixed;top:18px;left:18px;z-index:1000;
  width:44px;height:44px;border-radius:10px;
  background:rgba(0,0,0,.78);border:1px solid rgba(255,255,255,.18);
  display:flex;flex-direction:column;justify-content:center;align-items:center;gap:5px;
  cursor:pointer;transition:.25s;backdrop-filter:blur(10px);
}
.hamburger:hover{background:var(--orange);border-color:var(--orange)}
.hamburger span{width:22px;height:2.5px;background:#fff;border-radius:2px;transition:.25s}
.hamburger.active span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.active span:nth-child(2){opacity:0}
.hamburger.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ─── SIDEBAR ─── */
.sidebar{
  position:fixed;top:0;left:0;height:100vh;height:100dvh;width:var(--sidebar-w);
  background:linear-gradient(180deg,#0f0f23,#1a1a2e);
  color:#fff;z-index:999;
  transform:translateX(-100%);transition:transform .3s ease;
  display:flex;flex-direction:column;
  box-shadow:6px 0 24px rgba(0,0,0,.4);
}
.sidebar.open{transform:translateX(0)}
.sidebar-header{
  padding:24px 22px 20px 76px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.sidebar-title{
  font-family:var(--font-display);font-weight:800;
  font-size:var(--fs-lg);letter-spacing:.5px;
}
.sidebar-title span{color:var(--orange)}
.sidebar-subtitle{font-size:var(--fs-xs);color:rgba(255,255,255,.55);margin-top:4px;font-weight:500}

.sidebar-section{
  padding:16px 20px 8px;
  font-size:var(--fs-xs);font-weight:700;
  text-transform:uppercase;letter-spacing:1.5px;color:rgba(255,255,255,.4);
}

.mineral-list{flex:1;overflow-y:auto;padding:0 14px 14px;-webkit-overflow-scrolling:touch}
.mineral-list::-webkit-scrollbar{width:5px}
.mineral-list::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
.mineral-item{
  display:flex;align-items:center;gap:14px;
  padding:12px 14px;border-radius:9px;cursor:pointer;
  font-weight:600;font-size:var(--fs-md);color:rgba(255,255,255,.78);
  transition:.18s;margin-bottom:3px;border:none;background:none;
  width:100%;text-align:left;font-family:var(--font-main);
}
.mineral-item:hover{background:rgba(255,255,255,.06);color:#fff}
.mineral-item.active{background:var(--orange);color:#fff}
.mineral-symbol{
  width:36px;height:36px;border-radius:7px;
  background:rgba(255,255,255,.10);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font-display);font-weight:800;font-size:var(--fs-sm);
  flex-shrink:0;letter-spacing:.5px;
}
.mineral-item.active .mineral-symbol{background:rgba(0,0,0,.28)}

.sidebar-footer{
  padding:16px 20px;border-top:1px solid rgba(255,255,255,.08);
  display:flex;flex-direction:column;gap:8px;
}
.sidebar-btn{
  width:100%;padding:11px 14px;border-radius:8px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:#fff;font-weight:600;font-size:var(--fs-sm);cursor:pointer;
  font-family:var(--font-main);transition:.2s;
}
.sidebar-btn:hover{background:rgba(255,255,255,.12)}
.sidebar-btn.primary{background:var(--orange);border-color:var(--orange)}
.sidebar-btn.primary:hover{background:#d18209}

.sidebar-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  z-index:998;opacity:0;pointer-events:none;transition:.3s;
}
.sidebar-overlay.active{opacity:1;pointer-events:auto}

/* ─── NAV CONTROLS ─── */
.nav-controls{
  position:fixed;bottom:18px;right:18px;z-index:500;
  display:flex;align-items:center;gap:8px;
  background:rgba(0,0,0,.78);backdrop-filter:blur(10px);
  padding:7px;border-radius:12px;border:1px solid rgba(255,255,255,.15);
}
.nav-btn{
  width:38px;height:38px;border-radius:8px;border:none;
  background:rgba(255,255,255,.08);color:#fff;cursor:pointer;
  font-size:var(--fs-md);font-weight:700;transition:.2s;
}
.nav-btn:hover{background:var(--orange)}
.nav-counter{
  font-size:var(--fs-sm);font-weight:700;color:rgba(255,255,255,.85);
  padding:0 12px;min-width:65px;text-align:center;font-family:var(--font-display);
}

/* ════════════════════════════════════════════════════════════════════
   📜 VIEWER + SLIDE — desktop trava em 100vh, mobile rola livre
   ════════════════════════════════════════════════════════════════════ */
.viewer{
  position:fixed;inset:0;
  display:flex;align-items:stretch;justify-content:center;
  cursor:pointer;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  overscroll-behavior:contain;
}
.slide{
  width:100vw;
  background:var(--bg-page);
  position:relative;overflow:hidden;
  display:flex;flex-direction:column;
  height:100vh;
  flex-shrink:0;
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.slide{animation:fadeIn .25s ease}
.slide-bg{position:absolute;inset:0;z-index:0;pointer-events:none}
.slide:not(.slide-capa)>*:not(.slide-bg){position:relative;z-index:1}

/* ─── HEADER ─── */
.slide-header{
  padding:18px var(--pad-slide-x) 14px 76px;
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:2px solid var(--orange);
  flex-shrink:0;
}
.header-left{display:flex;align-items:center;gap:14px;min-width:0}
.header-symbol{
  background:var(--orange);color:#fff;
  font-family:var(--font-display);font-weight:800;font-size:var(--fs-md);
  padding:7px 16px;border-radius:7px;letter-spacing:1px;flex-shrink:0;
}
.header-title{font-family:var(--font-display);font-size:var(--fs-2xl);font-weight:700;line-height:1.1}
.header-subtitle{font-size:var(--fs-sm);color:var(--gray);margin-top:3px}
.header-logo{
  text-align:right;font-size:var(--fs-xs);font-weight:700;
  text-transform:uppercase;letter-spacing:.4px;color:var(--gray);line-height:1.4;
  flex-shrink:0;
}
.header-logo .gov{color:var(--br-blue);font-weight:800}

.slide-content{
  padding:var(--pad-slide-y) var(--pad-slide-x);flex:1;
  display:flex;gap:var(--gap-cards);
  min-height:0;
}

/* ─── CARDS ─── */
.card{
  background:var(--bg-card);border:1px solid #E5E3DF;border-radius:var(--radius);
  padding:var(--pad-card);display:flex;flex-direction:column;
  box-shadow:var(--shadow-sm);min-height:0;
}
.card-highlight{
  background:linear-gradient(135deg,var(--orange-fill),#FFF0D0);
  border:2px solid var(--orange);border-radius:var(--radius);
  padding:var(--pad-card);display:flex;flex-direction:column;min-height:0;
}
.card-badge{
  font-family:var(--font-display);font-weight:700;font-size:var(--fs-sm);
  text-transform:uppercase;letter-spacing:.7px;color:var(--orange);
  margin-bottom:11px;padding-bottom:7px;border-bottom:2px solid var(--orange);
  width:fit-content;flex-shrink:0;
}
.card-highlight .card-badge{color:var(--dark);border-color:var(--dark)}
.text-body{font-size:var(--fs-md);line-height:1.55;color:var(--dark)}

/* ─── FOTO EMPREENDIMENTO ─── */
.emp-photo{
  width:100%;height:var(--emp-photo-h);
  object-fit:cover;
  border-radius:var(--radius-sm);
  margin-bottom:14px;
  background:#f0efec;
  display:block;
  box-shadow:var(--shadow-sm);
}
.emp-photo-fallback{
  width:100%;height:var(--emp-photo-h);
  border-radius:var(--radius-sm);
  margin-bottom:14px;
  background:linear-gradient(135deg,#EDECEA,#DAD8D2);
  display:flex;align-items:center;justify-content:center;
  color:var(--light);font-weight:600;font-size:var(--fs-sm);
  border:2px dashed #C9C7C2;
  text-align:center;padding:10px;
}

/* ─── CAPA — usa <img> real para podermos ter fallback ─── */
.slide-capa{padding:0;background:#1a1a2e;position:relative}
.capa-photo-wrapper{
  position:absolute;inset:0;overflow:hidden;background:#2a2a3e;
}
.capa-photo-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;
}
.capa-photo-wrapper::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(105deg,rgba(0,0,0,.55) 0%,rgba(0,0,0,.20) 50%,rgba(0,0,0,.05) 100%);
  pointer-events:none;
}
.capa-photo-placeholder{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.35);font-family:var(--font-display);font-weight:700;
  font-size:var(--fs-xl);text-align:center;letter-spacing:1px;
  background:linear-gradient(135deg,#2a2a3e,#1a1a2e);padding:30px;
}
.capa-photo-placeholder .icon{font-size:120px;display:block;margin-bottom:14px;opacity:.35}

.capa-glass{
  position:absolute;
  left:7%;top:50%;transform:translateY(-50%);
  width:min(46%, 580px);
  background:var(--glass-bg);
  backdrop-filter:var(--glass-blur);
  -webkit-backdrop-filter:var(--glass-blur);
  border:var(--glass-border);
  border-radius:20px;
  padding:38px 42px;
  box-shadow:0 20px 60px rgba(0,0,0,.35);
  z-index:2;
}
.capa-symbol-tag{
  font-family:var(--font-display);font-weight:800;
  font-size:var(--fs-xl);color:#fff;background:var(--orange);
  display:inline-block;padding:9px 24px;border-radius:9px;
  margin-bottom:20px;letter-spacing:2px;
}
.capa-glass h1{
  font-family:var(--font-display);font-size:var(--fs-hero);font-weight:800;
  line-height:1.02;margin-bottom:18px;color:var(--dark);
}
.capa-glass .sub{
  font-size:var(--fs-md);color:var(--dark);line-height:1.5;
  border-left:3px solid var(--orange);padding-left:14px;
  font-weight:500;
}
.capa-footer-bar{
  position:absolute;bottom:0;left:0;right:0;height:6px;z-index:3;
  background:linear-gradient(90deg,var(--br-green),var(--br-yellow),var(--br-blue));
}

/* ─── S2 VISÃO GERAL ─── */
.s2-layout{display:flex;gap:var(--gap-cards);width:100%;height:100%;min-height:0}
.s2-col{flex:1;display:flex;flex-direction:column;gap:var(--gap-cards);min-height:0}
.pos-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.pos-item{background:var(--orange-light);border-radius:var(--radius-sm);padding:13px;text-align:center}
.pos-val{font-family:var(--font-display);font-size:var(--fs-2xl);font-weight:800;color:var(--orange)}
.pos-label{font-size:var(--fs-xs);font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.4px}
.gap-area{display:flex;flex-direction:column;gap:5px;margin-top:10px}
.gap-section-label{font-size:var(--fs-xs);font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.4px;margin-top:8px}
.gap-chart{display:flex;align-items:center;gap:10px}
.gap-label{width:85px;font-size:var(--fs-sm);font-weight:700;text-align:right}
.gap-bar-bg{flex:1;height:22px;background:#EDECEA;border-radius:5px;overflow:hidden}
.gap-bar-fill{height:100%;border-radius:5px;transition:width .5s}
.gap-bar-fill.br-fill{background:var(--orange)}
.gap-bar-fill.leader-fill{background:var(--gray)}
.gap-val{width:55px;font-size:var(--fs-sm);font-weight:700}

/* ─── S3 NÚMEROS ─── */
.grid-pizza{display:grid;grid-template-columns:1.1fr 0.9fr;gap:var(--gap-cards);height:100%;min-height:0}
.pie-wrapper{display:flex;align-items:center;gap:22px;flex:1;min-height:0}
.pie-container{
  width:180px;height:180px;border-radius:50%;
  box-shadow:inset 0 0 0 2px rgba(255,255,255,.5),0 3px 10px rgba(0,0,0,.1);
  flex-shrink:0;
}
.pie-legend-box{flex:1;font-size:var(--fs-md);min-width:0}
.pie-legend-row{display:flex;justify-content:space-between;margin-bottom:10px;font-weight:600;align-items:center;gap:8px}
.pie-dot{width:14px;height:14px;border-radius:3px;margin-right:8px;display:inline-block;flex-shrink:0}

.flags-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:11px;margin-top:8px;flex:1;align-content:center}
.flag-box{
  background:#fff;border:2px solid var(--orange);border-radius:var(--radius-sm);
  padding:14px 8px;text-align:center;
}
.flag-emoji{
  font-family:"Twemoji Country Flags",sans-serif;
  font-size:38px;margin-bottom:5px;line-height:1;
}
.flag-label{font-size:var(--fs-xs);font-weight:700;color:var(--orange);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.flag-country{font-family:var(--font-display);font-size:var(--fs-md);font-weight:700}

.bar-chart-area{display:flex;flex-direction:column;gap:10px}
.transf-bar-row{display:flex;align-items:center;gap:10px}
.transf-label{width:80px;font-size:var(--fs-sm);font-weight:700;text-align:right}
.transf-bar-bg{flex:1;height:26px;background:#EDECEA;border-radius:5px;overflow:hidden}
.transf-bar-fill{
  height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;
  padding-right:8px;font-size:var(--fs-sm);font-weight:700;color:#fff;min-width:30px;
}
.transf-bar-fill.is-br{background:var(--orange)}
.transf-bar-fill.is-other{background:#888}

/* ─── S5 CADEIA GLOBAL ─── */
.grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1.4fr;gap:var(--gap-cards);height:100%;min-height:0}
.company-list{list-style:none;overflow-y:auto;flex:1}
.company-list::-webkit-scrollbar{width:4px}
.company-list::-webkit-scrollbar-thumb{background:#ddd;border-radius:2px}
.company-list li{
  font-size:var(--fs-sm);padding:9px 0;border-bottom:1px solid #F0EFEC;
  display:flex;flex-direction:column;gap:3px;
}
.c-flag{font-family:"Twemoji Country Flags",sans-serif;margin-right:4px}
.c-title{font-weight:700;color:var(--dark)}
.c-meta{color:var(--light);font-size:var(--fs-xs)}

/* ─── PLACEHOLDER IMG ─── */
.img-placeholder{
  flex:1;background:#fff;border:2px dashed #D5D3CF;border-radius:var(--radius);
  display:flex;align-items:center;justify-content:center;
  font-weight:700;color:var(--light);font-size:var(--fs-md);
  text-align:center;padding:40px;min-height:0;
  overflow:hidden;
}
.img-placeholder img{max-width:100%;max-height:100%;object-fit:contain}
.img-placeholder .icon{font-size:72px;margin-bottom:14px;opacity:.3;display:block}
.img-placeholder .title{font-family:var(--font-display);font-size:var(--fs-xl);color:var(--gray);margin-bottom:6px}
.img-placeholder .hint{font-size:var(--fs-sm);font-weight:400;color:#aaa}

.slide-footer{
  padding:9px var(--pad-slide-x) 9px 76px;
  display:flex;justify-content:space-between;
  font-size:var(--fs-xs);font-weight:600;color:var(--light);
  border-top:1px solid #E5E3DF;background:rgba(255,255,255,.5);
  flex-shrink:0;gap:4px;
}

/* ════════════════════════════════════════════════════════════════════
   📱 MOBILE — slide cresce livremente, viewer rola
   ════════════════════════════════════════════════════════════════════ */

@media(max-width:900px){
  :root{
    --sidebar-w:280px;
    --pad-slide-x:18px;
    --pad-slide-y:14px;
    --pad-card:14px;
    --gap-cards:12px;
    --fs-hero:36px;
    --fs-2xl:18px;
    --fs-xl:17px;
    --emp-photo-h:160px;
  }

  /* ── FIX SCROLL: viewer vira block no mobile (some o flex que travava) ── */
  .viewer{
    display:block;
  }

  .slide{
    height:auto !important;
    min-height:100vh;min-height:100dvh;
    display:flex;
    flex-direction:column;
  }

  /* ── FIX SOBREPOSIÇÃO: força altura automática em todos os containers ── */
  .slide-content, .s2-layout, .grid-pizza, .grid-4{
    height:auto !important;
    min-height:auto !important;
    overflow:visible;
  }

  .slide-content{
    flex-direction:column;
    flex:none;
  }
  .slide-header{padding:14px 18px 10px 70px}
  .slide-footer{padding:8px 18px 8px 70px}
  .header-logo{display:none}
  .header-title{font-size:var(--fs-xl)}
  .header-subtitle{font-size:var(--fs-xs)}

  /* Capa em mobile: foto no topo + glass card sobreposto descendo
     IMPORTANTE: .slide-capa não vira flex porque ele já é position:relative
     e os filhos se posicionam por margin/relative — mantemos a estrutura
     do desktop, só trocando absolute por relative. */
  .slide-capa{
    height:auto !important;
    min-height:0 !important;
    display:block !important;
    background:#1a1a2e;
  }
  .capa-photo-wrapper{
    position:relative;inset:auto;
    width:100%;height:38vh;height:38dvh;
    display:block;
  }
  .capa-glass{
    position:relative;
    left:auto;right:auto;top:auto;bottom:auto;
    transform:none;
    width:auto;
    margin:-44px 14px 24px;
    padding:22px 24px;
    display:block;
  }

  /* Cards / colunas */
  .s2-layout{flex-direction:column}
  .s2-col{flex:none}
  .card, .card-highlight{flex:none !important}
  .grid-pizza{grid-template-columns:1fr;gap:var(--gap-cards)}
  .grid-4{grid-template-columns:1fr 1fr}
  .pos-grid{gap:8px}
  .pos-item{padding:11px 8px}
  .pos-val{font-size:20px}

  /* Pie chart: empilha vertical */
  .pie-wrapper{flex-direction:column;gap:14px;align-items:stretch}
  .pie-container{width:140px;height:140px;margin:0 auto}
  .pie-legend-box{font-size:var(--fs-sm)}

  /* Listas: sem scroll, mostra tudo */
  .company-list{overflow-y:visible;max-height:none}

  /* Slides de imagem: altura mínima decente */
  .img-placeholder{min-height:50vh;min-height:50dvh}

  /* Empreendimento card */
  .emp-photo, .emp-photo-fallback{height:var(--emp-photo-h)}

  /* Nav controls discretos */
  .nav-controls{
    bottom:10px;right:10px;padding:4px;gap:3px;
    background:rgba(0,0,0,.55);backdrop-filter:blur(10px);
    border-radius:9px;
  }

let H = [], cM = 0, cS = 0;
const SN = CONFIG.slidesPerMineral;

const flag = (emoji) => `<span class="c-flag">${emoji}</span>`;
const totalSlides = () => MINERAL_DATA.length * SN;
const globalIndex = () => cM * SN + cS;

function buildHeader(m, slideTitle){
  return `<div class="slide-header">
    <div class="header-left">
      <div class="header-symbol">${m.simbolo}</div>
      <div>
        <div class="header-title">${slideTitle}</div>
        <div class="header-subtitle">${m.nome}</div>
      </div>
    </div>
    <div class="header-logo">Ministério de<br>Minas e Energia<br><span class="gov">Governo Federal</span></div>
  </div>`;
}
function buildFooter(source){
  return `<div class="slide-footer">
    <div>Fonte: ${source || 'USGS 2024-2025 / WNA / SNGM'}</div>
    <div>SNGM</div>
  </div>`;
}

function buildPie(data){
  let stops = [], acc = 0;
  data.forEach(x => { stops.push(`${x.color} ${acc}% ${acc + x.val}%`); acc += x.val });
  const legend = data.map(x =>
    `<div class="pie-legend-row">
      <div style="display:flex;align-items:center;min-width:0"><span class="pie-dot" style="background:${x.color}"></span>${x.label}</div>
      <span>${x.val}%</span>
    </div>`
  ).join('');
  return `<div class="pie-wrapper">
    <div class="pie-container" style="background:conic-gradient(${stops.join(',')})"></div>
    <div class="pie-legend-box">${legend}</div>
  </div>`;
}

function buildBar(data){
  return '<div class="bar-chart-area">' + data.map(x => {
    const isBR = x.label === "Brasil";
    const cls = isBR ? 'is-br' : 'is-other';
    const w = Math.max(x.val, 1.5);
    return `<div class="transf-bar-row">
      <div class="transf-label" style="${isBR ? 'color:var(--orange)' : ''}">${x.label}</div>
      <div class="transf-bar-bg">
        <div class="transf-bar-fill ${cls}" style="width:${w}%">${x.val > 3 ? x.val + '%' : ''}</div>
      </div>
      ${x.val <= 3 ? `<span style="font-size:var(--fs-sm);font-weight:700;width:32px;${isBR ? 'color:var(--orange)' : ''}">${x.val}%</span>` : ''}
    </div>`;
  }).join('') + '</div>';
}

function listHTML(arr){
  return '<ul class="company-list">' + arr.map(i =>
    `<li>
      <div class="c-title">${flag(i.bandeira)}${i.pais}: ${i.emp}</div>
      <div class="c-meta">Opera: ${i.opera}</div>
    </li>`
  ).join('') + '</ul>';
}

function assetUrl(slug, tema){
  if(!CONFIG.imagesEnabled) return null;
  return `${CONFIG.imagePath}${slug}_${tema}.${CONFIG.imageExt}`;
}

function gapRow(label, val, isBR){
  const cls = isBR ? 'br-fill' : 'leader-fill';
  const color = isBR ? 'color:var(--orange)' : '';
  return `<div class="gap-chart">
    <div class="gap-label" style="${color}">${label}</div>
    <div class="gap-bar-bg"><div class="gap-bar-fill ${cls}" style="width:${Math.max(val, .5)}%"></div></div>
    <div class="gap-val" style="${color}">${val}%</div>
  </div>`;
}

function buildImageSlide(m, slideTitle, tema, icon, label){
  const url = assetUrl(m.slug, tema);
  const fallbackHtml = `<div><span class="icon">${icon}</span><div class="title">${label} — ${m.nome}</div><div class="hint">Imagem esperada: ${m.slug}_${tema}.${CONFIG.imageExt}</div></div>`;
  // imagem sem onerror inline — o fallback é encodado em data-fallback
  // e aplicado por JS depois (evita problemas de escape de aspas)
  const content = url
    ? `<img src="${url}" alt="${label} — ${m.nome}" data-fallback="${encodeURIComponent(fallbackHtml)}" data-fallback-mode="outer">`
    : fallbackHtml;
  return `<div class="slide">${buildHeader(m, slideTitle)}
    <div class="slide-content">
      <div class="img-placeholder">${content}</div>
    </div>
    ${buildFooter()}
  </div>`;
}

  function fade(t){return t*t*t*(t*(t*6-15)+10)}
  function lerp(a,b,t){return a+(b-a)*t}
  function dot2(g,x,y){return g[0]*x+g[1]*y}
  function noise2(x,y){const X=Math.floor(x)&255,Y=Math.floor(y)&255;x-=Math.floor(x);y-=Math.floor(y);const u=fade(x),v=fade(y);const a=perm[X]+Y,b=perm[X+1]+Y;return lerp(lerp(dot2(grad3[perm[a]%12],x,y),dot2(grad3[perm[b]%12],x-1,y),u),lerp(dot2(grad3[perm[a+1]%12],x,y-1),dot2(grad3[perm[b+1]%12],x-1,y-1),u),v)}
  function fbm(x,y){let v=0,amp=1,freq=1,max=0;for(let i=0;i<5;i++){v+=noise2(x*freq,y*freq)*amp;max+=amp;amp*=0.52;freq*=2}return v/max}
  function lerp01(x1,y1,x2,y2,v1,v2,t){if(Math.abs(v2-v1)<1e-9)return[(x1+x2)/2,(y1+y2)/2];const r2=(t-v1)/(v2-v1);return[x1+(x2-x1)*r2,y1+(y2-y1)*r2]}
  function generate(w,h){
    const key=w+'x'+h;if(cache[key])return cache[key];
    const cv=document.createElement('canvas');cv.width=w;cv.height=h;
    const ctx=cv.getContext('2d');
    ctx.fillStyle='#F0EFEC';ctx.fillRect(0,0,w,h);
    const sc=0.0022;
    const GW=Math.ceil(w/8)+2,GH=Math.ceil(h/8)+2;
    const cW=w/(GW-1),cH=h/(GH-1);
    const grid=[];
    for(let r=0;r<GH;r++){const row=[];for(let c=0;c<GW;c++){row.push(fbm((c*cW)*sc,(r*cH)*sc))}grid.push(row)}
    let mn=Infinity,mx=-Infinity;
    for(let r=0;r<GH;r++)for(let c=0;c<GW;c++){if(grid[r][c]<mn)mn=grid[r][c];if(grid[r][c]>mx)mx=grid[r][c]}
    const N=24;
    for(let l=1;l<N;l++){
      const frac=l/N;const threshold=mn+(mx-mn)*frac;
      const isAccent=(l%5===0);
      const base=Math.round(170+frac*30);
      const alpha=isAccent?0.45:0.22;
      ctx.strokeStyle=`rgba(${base-20},${base-10},${base-25},${alpha})`;
      ctx.lineWidth=isAccent?1.2:0.5;
      ctx.lineJoin='round';ctx.lineCap='round';
      const segs=[];
      for(let row=0;row<GH-1;row++){for(let col=0;col<GW-1;col++){
        const tl=grid[row][col],tr=grid[row][col+1],bl=grid[row+1][col],br=grid[row+1][col+1];
        const idx=(tl>=threshold?8:0)|(tr>=threshold?4:0)|(br>=threshold?2:0)|(bl>=threshold?1:0);
        if(idx===0||idx===15)continue;
        const top=lerp01(col,row,col+1,row,tl,tr,threshold);
        const right=lerp01(col+1,row,col+1,row+1,tr,br,threshold);
        const bot=lerp01(col+1,row+1,col,row+1,br,bl,threshold);
        const left=lerp01(col,row+1,col,row,bl,tl,threshold);
        const cases={1:[left,bot],2:[bot,right],3:[left,right],4:[top,right],5:[top,right,left,bot],6:[top,bot],7:[top,left],8:[top,left],9:[top,bot],10:[top,left,bot,right],11:[top,right],12:[left,right],13:[bot,right],14:[left,bot]};
        const pts=cases[idx];if(!pts)continue;
        for(let i=0;i<pts.length;i+=2)segs.push({x1:pts[i][0],y1:pts[i][1],x2:pts[i+1][0],y2:pts[i+1][1]});
      }}
      ctx.beginPath();
      for(const s of segs){ctx.moveTo(s.x1*cW,s.y1*cH);ctx.lineTo(s.x2*cW,s.y2*cH)}
      ctx.stroke();
    }
    return cache[key] = cv.toDataURL('image/jpg');
  }
  return { generate };
})();

let bgCache = null, bgPrintCache = null;
function injectBg(){
  if(!bgCache){
    const w = Math.min(window.innerWidth, 1920);
    const h = Math.min(window.innerHeight, 1080);
    bgCache = CONTOUR_BG.generate(w, h);
  }
  document.querySelectorAll('#sc .slide:not(.slide-capa)').forEach(sl => {
    if(!sl.querySelector('.slide-bg')){
      const bg = document.createElement('div');
      bg.className = 'slide-bg';
      bg.style.backgroundImage = `url(${bgCache})`;
      bg.style.backgroundSize = 'cover';
      bg.style.backgroundPosition = 'center';
      sl.prepend(bg);
    }
  });
}

/* ════════════════════════════════════════════════════════════════════
   🎮 NAVEGAÇÃO
   ════════════════════════════════════════════════════════════════════ */
function init(){
  H = [];
  MINERAL_DATA.forEach(m => H.push(...generateSlides(m)));
}

function render(){
  const i = globalIndex();
  document.getElementById('sc').innerHTML = H[i];
  document.getElementById('cn').textContent = `${i + 1} / ${totalSlides()}`;
  document.querySelectorAll('.mineral-item').forEach((t, j) => t.classList.toggle('active', j === cM));
  injectBg();
  attachImageFallbacks();
  const v = document.getElementById('sc');
  if(v) v.scrollTop = 0;
}

// Configura fallbacks de imagens via data-fallback (evita onerror inline com escape problemático)
function attachImageFallbacks(){
  document.querySelectorAll('#sc img[data-fallback]').forEach(img => {
    if(img.dataset.fbBound) return;
    img.dataset.fbBound = '1';
    const apply = () => {
      const html = decodeURIComponent(img.dataset.fallback);
      const mode = img.dataset.fallbackMode;
      if(mode === 'parent' && img.parentNode){
        img.parentNode.innerHTML = html;
      } else {
        img.outerHTML = html;
      }
    };
    img.addEventListener('error', apply);
    // se a imagem já falhou antes do listener (cached error), aplica agora
    if(img.complete && img.naturalWidth === 0) apply();
  });
}
function next(){ if(globalIndex() < totalSlides() - 1){ cS++; if(cS >= SN){ cM++; cS = 0 } render() } }
function prev(){ if(globalIndex() > 0){ cS--; if(cS < 0){ cM--; cS = SN - 1 } render() } }
function goTo(i){ cM = i; cS = 0; render(); closeSidebar() }

function openSidebar(){
  document.getElementById('sb').classList.add('open');
  document.getElementById('so').classList.add('active');
  document.getElementById('hb').classList.add('active');
}
function closeSidebar(){
  document.getElementById('sb').classList.remove('open');
  document.getElementById('so').classList.remove('active');
  document.getElementById('hb').classList.remove('active');
}
function toggleSidebar(){
  document.getElementById('sb').classList.contains('open') ? closeSidebar() : openSidebar();
}

function printPDF(){
  const pc = document.getElementById('pc');
  pc.innerHTML = H.join('');
  if(!bgPrintCache) bgPrintCache = CONTOUR_BG.generate(1400, 990);
  pc.querySelectorAll('.slide:not(.slide-capa)').forEach(sl => {
    if(!sl.querySelector('.slide-bg')){
      const bg = document.createElement('div');
      bg.className = 'slide-bg';
      bg.style.backgroundImage = `url(${bgPrintCache})`;
      bg.style.backgroundSize = 'cover';
      bg.style.backgroundPosition = 'center';
      sl.prepend(bg);
    }
  });
  // mesmo handler de fallback para imagens no container de print
  pc.querySelectorAll('img[data-fallback]').forEach(img => {
    const apply = () => {
      const html = decodeURIComponent(img.dataset.fallback);
      const mode = img.dataset.fallbackMode;
      if(mode === 'parent' && img.parentNode){
        img.parentNode.innerHTML = html;
      } else {
        img.outerHTML = html;
      }
    };
    img.addEventListener('error', apply);
    if(img.complete && img.naturalWidth === 0) apply();
  });
  setTimeout(() => window.print(), 600);
}

/* ════════════════════════════════════════════════════════════════════
   🎯 INTERAÇÃO — diferencia tap (avança) de scroll/swipe (rola)
   ════════════════════════════════════════════════════════════════════ */
window.onload = () => {
  init();
  document.getElementById('mt').innerHTML = MINERAL_DATA.map((m, i) =>
    `<button class="mineral-item${i === 0 ? ' active' : ''}" onclick="goTo(${i})">
      <span class="mineral-symbol">${m.simbolo}</span>${m.nome}
    </button>`
  ).join('');
  render();

  document.getElementById('hb').addEventListener('click', e => { e.stopPropagation(); toggleSidebar() });
  document.getElementById('so').addEventListener('click', closeSidebar);

  const sc = document.getElementById('sc');

  // ─── DESKTOP only: click pra avançar (>900px). Mobile usa só swipe + botões. ───
  let pressStart = null;
  sc.addEventListener('mousedown', e => {
    pressStart = { x: e.clientX, y: e.clientY, t: Date.now(), scrollTop: sc.scrollTop };
  });
  sc.addEventListener('mouseup', e => {
    if(!pressStart) return;
    const dx = Math.abs(e.clientX - pressStart.x);
    const dy = Math.abs(e.clientY - pressStart.y);
    const dt = Date.now() - pressStart.t;
    const dScroll = Math.abs(sc.scrollTop - pressStart.scrollTop);
    pressStart = null;
    // só desktop: nem cursor nem scroll se mexeram, e tela é grande
    if(dx < 8 && dy < 8 && dScroll < 5 && dt < 400 && window.innerWidth > 900) next();
  });

  // ─── MOBILE: só swipe horizontal troca slide. Vertical = scroll natural. ───
  // Tap não avança mais (no mobile usuário usa botões ◀ ▶ ou menu lateral)
  let tStart = null;
  let isHSwipe = false;

  sc.addEventListener('touchstart', e => {
    if(e.touches.length > 1){ tStart = null; return; }
    const t = e.touches[0];
    tStart = { x: t.screenX, y: t.screenY, scrollTop: sc.scrollTop };
    isHSwipe = false;
  }, { passive: true });

  sc.addEventListener('touchmove', e => {
    if(!tStart || e.touches.length > 1) return;
    const t = e.touches[0];
    const dx = t.screenX - tStart.x;
    const dy = t.screenY - tStart.y;
    if(!isHSwipe && Math.abs(dx) > 30 && Math.abs(dx) > Math.abs(dy) * 1.8){
      isHSwipe = true;
    }
  }, { passive: true });

  sc.addEventListener('touchend', e => {
    if(!tStart) return;
    const t = e.changedTouches[0];
    const dx = t.screenX - tStart.x;
    const ady = Math.abs(t.screenY - tStart.y);
    const adx = Math.abs(dx);
    const dScroll = Math.abs(sc.scrollTop - tStart.scrollTop);
    const wasHSwipe = isHSwipe;
    tStart = null;

    // só swipe horizontal claro muda slide; vertical já scrolou normal
    if(wasHSwipe && adx > 60 && adx > ady * 2 && dScroll < 10){
      dx < 0 ? next() : prev();
    }
  }, { passive: true });

  // ─── Resize: regenera bg só se a largura mudou bastante ───
  let rt, lastW = window.innerWidth;
  window.addEventListener('resize', () => {
    clearTimeout(rt);
    rt = setTimeout(() => {
      const dw = Math.abs(window.innerWidth - lastW);
      if(dw > 200){
        bgCache = null;
        lastW = window.innerWidth;
        injectBg();
      }
    }, 400);
  });
};

document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight' || e.key === ' '){ e.preventDefault(); next() }
  if(e.key === 'ArrowLeft') prev();
  if(e.key === 'Escape') closeSidebar();
});
</script>
