<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Dashboard SNGM - Minerais Estratégicos</title>

<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<!-- Twemoji Country Flags: garante bandeiras em Windows/Chrome -->
<link rel="preload" href="https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1/dist/TwemojiCountryFlags.woff2" as="font" type="font/woff2" crossorigin>
<style>
@font-face {
  font-family: "Twemoji Country Flags";
  unicode-range: U+1F1E6-1F1FF, U+1F3F4, U+E0062-E007F;
  src: url('https://cdn.jsdelivr.net/npm/country-flag-emoji-polyfill@0.1/dist/TwemojiCountryFlags.woff2') format('woff2');
  font-display: swap;
}
</style>
<!-- Chamada do arquivo CSS externo -->
<link rel="stylesheet" href="style.css">


</head>
<body>

<button class="hamburger" id="hb" aria-label="Menu"><span></span><span></span><span></span></button>
<div class="sidebar-overlay" id="so"></div>

<nav class="sidebar" id="sb">
  <div class="sidebar-header">
    <div class="sidebar-title"><span>MME</span> / SNGM</div>
    <div class="sidebar-subtitle">Minerais Estratégicos</div>
  </div>
  <div class="sidebar-section">Minérios</div>
  <div class="mineral-list" id="mt"></div>
  <div class="sidebar-footer">
    <button class="sidebar-btn primary" onclick="printPDF()">Exportar PDF</button>
  </div>
</nav>

<div class="nav-controls">
  <button class="nav-btn" onclick="prev();event.stopPropagation()" aria-label="Anterior">◀</button>
  <span class="nav-counter" id="cn">1 / 1</span>
  <button class="nav-btn" onclick="next();event.stopPropagation()" aria-label="Próximo">▶</button>
</div>

<div class="viewer" id="sc"></div>
<div id="pc" style="display:none"></div>
<script src="script.js"></script>

</body>
</html>
